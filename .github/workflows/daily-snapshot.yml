name: Daily Snapshot

# 毎日朝6:00 JST (21:00 UTC前日) に実行
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo

    steps:
      - uses: actions/checkout@v4

      - name: Generate daily snapshot
        run: |
          DATE=$(date '+%Y-%m-%d')
          DAY_OF_WEEK=$(date '+%A')
          SNAPSHOT_FILE="logs/daily/${DATE}-snapshot.md"

          mkdir -p logs/daily

          cat > "$SNAPSHOT_FILE" << SNAPSHOT
          # Daily Snapshot: ${DATE} (${DAY_OF_WEEK})

          > 自動生成 by GitHub Actions

          ## 現在のタスク状況

          $(grep -A 1 '^\- \[ \]' CLAUDE.md | head -40 || echo "タスクなし")

          ## 最近の更新ファイル（直近3日）

          $(git log --since="3 days ago" --name-only --pretty=format:"### %s (%ad)" --date=short | head -50 || echo "更新なし")

          ## リポジトリ統計

          - ドキュメント数: $(find docs/ -name "*.md" | wc -l) ファイル
          - ログ数: $(find logs/ -name "*.md" 2>/dev/null | wc -l) ファイル
          - 最終更新: $(git log -1 --format="%ad" --date=short)
          SNAPSHOT

          echo "Generated snapshot: $SNAPSHOT_FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/daily/
          git diff --cached --quiet || git commit -m "📋 日次スナップショット $(date '+%Y-%m-%d')"
          git push
