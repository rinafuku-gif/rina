name: Sync External Data

# 毎時実行（投稿と同じく「毎時自動」）
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install googleapis

      - name: Sync Google Calendar events
        if: env.GOOGLE_SERVICE_ACCOUNT_KEY != ''
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: node .github/scripts/sync-calendar.js

      - name: Update status summary
        run: |
          DATE=$(date '+%Y-%m-%d %H:%M')
          STATUS_FILE="data/status.md"
          mkdir -p data

          cat > "$STATUS_FILE" << STATUS
          # OpenClaw 参照用ステータス

          > 最終同期: ${DATE} JST
          > GitHub Actions による自動更新

          ## 同期済みデータ

          STATUS

          # カレンダーデータがあれば追記
          if [ -f "data/calendar-today.md" ]; then
            echo "### 📅 本日の予定" >> "$STATUS_FILE"
            cat data/calendar-today.md >> "$STATUS_FILE"
            echo "" >> "$STATUS_FILE"
          fi

          # 未完了タスク数を集計
          TASK_COUNT=$(grep -c '^\- \[ \]' CLAUDE.md 2>/dev/null || echo "0")
          echo "### 📋 未完了タスク: ${TASK_COUNT} 件" >> "$STATUS_FILE"

          echo "Status updated at $DATE"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ logs/
          git diff --cached --quiet || git commit -m "🔄 外部データ同期 $(date '+%H:%M')"
          git push
