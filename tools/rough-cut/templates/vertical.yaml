# 縦型動画設定（TikTok, Reels, Shorts）
resolution:
  width: 1080
  height: 1920

telop:
  max_chars_per_line: 12
  max_lines: 2
  font_size: 56
  font_family: "Noto Sans JP"
  font_weight: bold
  color: "#FFFFFF"
  stroke_color: "#000000"
  stroke_width: 3
  position: bottom  # bottom, center, top
  margin_bottom: 200
  bg_color: "rgba(0,0,0,0.5)"
  bg_padding: 12
