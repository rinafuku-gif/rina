<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
    color: #FFFFFF;
  }

  /* ── ベース背景 ── */
  .bg-dark {
    background: linear-gradient(165deg, #0F1923 0%, #1A1A2E 40%, #16213E 100%);
  }
  .bg-accent {
    background: linear-gradient(165deg, #1A1A2E 0%, #2D1B4E 50%, #1A1A2E 100%);
  }
  .bg-warm {
    background: linear-gradient(165deg, #1E1108 0%, #2A1810 40%, #1A1206 100%);
  }

  /* ── 共通レイアウト ── */
  .slide {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 80px;
    position: relative;
  }

  .safe-zone {
    padding-top: 320px;
    padding-bottom: 500px;
  }

  /* ── テキストスタイル ── */
  .hook-text {
    font-size: 84px;
    font-weight: 900;
    text-align: center;
    text-shadow: 0 4px 12px rgba(0,0,0,0.6);
    line-height: 1.35;
    letter-spacing: -1px;
  }

  .main-text {
    font-size: 72px;
    font-weight: 700;
    text-align: center;
    text-shadow: 0 3px 8px rgba(0,0,0,0.5);
    line-height: 1.3;
  }

  .sub-text {
    font-size: 48px;
    font-weight: 500;
    text-align: center;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 2px 4px rgba(0,0,0,0.4);
    line-height: 1.4;
    margin-top: 40px;
  }

  .supplement-text {
    font-size: 42px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 2px 4px rgba(0,0,0,0.4);
    line-height: 1.5;
  }

  .accent { color: #E8734A; }
  .accent-bg { background: rgba(232,115,74,0.85); }

  /* ── カード ── */
  .card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 44px 48px;
    width: 100%;
    max-width: 920px;
    backdrop-filter: blur(10px);
    margin-top: 48px;
  }

  /* ── CTAボタン ── */
  .cta-button {
    background: rgba(232,115,74,0.9);
    border-radius: 16px;
    padding: 28px 60px;
    font-size: 60px;
    font-weight: 700;
    text-align: center;
    box-shadow: 0 6px 24px rgba(232,115,74,0.35);
  }

  /* ── ステップ番号 ── */
  .step-number {
    font-size: 108px;
    font-weight: 900;
    color: #E8734A;
    line-height: 1;
    margin-bottom: 16px;
  }

  /* ── 比較 ── */
  .comparison {
    display: flex;
    align-items: center;
    gap: 32px;
    margin-top: 32px;
  }
  .comparison .before {
    font-size: 78px;
    font-weight: 700;
    color: rgba(255,255,255,0.45);
    text-decoration: line-through;
  }
  .comparison .arrow {
    font-size: 66px;
    color: #E8734A;
  }
  .comparison .after {
    font-size: 96px;
    font-weight: 900;
    color: #E8734A;
  }

  /* ── ブランド ── */
  .brand {
    position: absolute;
    bottom: 520px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 28px;
    font-weight: 500;
    color: rgba(255,255,255,0.35);
    letter-spacing: 3px;
  }

  /* ── アクセントバー ── */
  .accent-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, #E8734A, #F4A460);
  }

  /* ── 装飾ライン ── */
  .divider {
    width: 80px;
    height: 4px;
    background: #E8734A;
    border-radius: 2px;
    margin: 24px 0;
  }

  /* ── リストアイテム ── */
  .list-item {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding: 20px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .list-item:last-child { border-bottom: none; }
  .list-number {
    font-size: 48px;
    font-weight: 900;
    color: #E8734A;
    min-width: 60px;
  }
  .list-text {
    font-size: 42px;
    font-weight: 700;
    line-height: 1.4;
    padding-top: 6px;
  }

  /* ── 古い思い込みテキスト（カット2用） ── */
  .ghost-text {
    position: absolute;
    font-size: 24px;
    font-weight: 500;
    color: rgba(255,255,255,0.1);
    transform: rotate(-12deg);
  }
</style>
</head>
<body>
<!-- Content injected by render script -->
</body>
</html>
